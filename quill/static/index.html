<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quill — PDF Editor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs" type="module" id="pdfjs-script"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --surface3: #2a2f4a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent-hover: #8880ff;
      --accent-dim: rgba(108,99,255,0.12);
      --text: #e2e4f0;
      --text-dim: #7b7f9e;
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 44px;
      width: 360px;
      text-align: center;
    }

    .login-box .logo {
      width: 48px; height: 48px;
      background: var(--accent-dim);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      color: var(--accent);
    }

    .login-box h1 { font-size: 22px; margin-bottom: 6px; }
    .login-box p { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }

    .login-box input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Cascadia Code', monospace;
      outline: none;
      margin-bottom: 14px;
      letter-spacing: 2px;
      text-align: center;
    }

    .login-box input:focus { border-color: var(--accent); }

    .login-box button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-box button:hover { background: var(--accent-hover); }
    .login-error { color: var(--error); font-size: 12px; margin-top: 10px; display: none; }

    /* ── App shell ── */
    #app { display: none; flex-direction: column; height: 100vh; }
    #app.visible { display: flex; }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    header .logo-icon { color: var(--accent); }
    header h1 { font-size: 18px; font-weight: 700; }
    header .spacer { flex: 1; }

    header .key-badge {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: monospace;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    header .key-badge:hover { border-color: var(--accent); }

    header .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: var(--radius);
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    header .logout-btn:hover { color: var(--error); border-color: var(--error); }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr 320px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 12px 0;
      overflow-y: auto;
    }

    .group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-dim);
      padding: 12px 16px 5px;
    }

    nav button {
      display: block; width: 100%; text-align: left;
      background: none; border: none; border-left: 3px solid transparent;
      color: var(--text-dim); padding: 7px 16px;
      cursor: pointer; font-size: 13px; transition: all 0.12s;
    }
    nav button:hover { color: var(--text); background: var(--surface2); }
    nav button.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }

    /* ── Main ── */
    main { padding: 24px 28px; overflow-y: auto; }

    .panel { display: none; }
    .panel.active { display: block; }

    h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .desc { color: var(--text-dim); font-size: 13px; margin-bottom: 22px; }

    .form-grid { display: grid; gap: 14px; max-width: 520px; }

    label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--text-dim); }
    label strong { color: var(--text); font-size: 13px; }

    input[type="text"], input[type="number"], select, textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      padding: 9px 12px; font-size: 13px; font-family: inherit;
      width: 100%; outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      background: var(--surface2);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .dz-icon { font-size: 28px; margin-bottom: 8px; }
    .drop-zone .dz-text { color: var(--text-dim); font-size: 13px; }
    .drop-zone .dz-text strong { color: var(--accent); }
    .drop-zone .dz-files { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .drop-zone .dz-file-item {
      background: var(--surface3); border-radius: 6px;
      padding: 5px 10px; font-size: 12px; color: var(--text);
      display: flex; align-items: center; gap: 8px; text-align: left;
    }
    .drop-zone .dz-file-item .dz-remove {
      margin-left: auto; color: var(--text-dim); cursor: pointer;
      background: none; border: none; font-size: 14px; line-height: 1;
      padding: 0 2px;
    }
    .drop-zone .dz-file-item .dz-remove:hover { color: var(--error); }

    button.submit {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); padding: 10px 22px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s; width: fit-content;
    }
    button.submit:hover { background: var(--accent-hover); }
    button.submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 16px; padding: 12px 16px;
      border-radius: var(--radius); font-size: 13px; display: none;
    }
    .result.success {
      background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25);
      color: var(--success); display: block;
    }
    .result.error {
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25);
      color: var(--error); display: block;
    }
    .result a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .result a:hover { text-decoration: underline; }

    .json-result {
      margin-top: 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
      font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px;
      white-space: pre-wrap; word-break: break-all;
      max-height: 320px; overflow-y: auto; display: none; color: var(--text-dim);
    }

    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Preview panel ── */
    .preview-panel {
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .preview-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.8px;
      display: flex; align-items: center; gap: 10px;
    }

    .preview-header .page-controls {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
    }

    .preview-header button {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 3px 9px;
      cursor: pointer; font-size: 12px; transition: all 0.12s;
    }
    .preview-header button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .preview-header button:disabled { opacity: 0.4; cursor: not-allowed; }
    .preview-header .page-info { font-size: 12px; color: var(--text-dim); min-width: 55px; text-align: center; }

    .preview-body {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    .preview-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-dim);
      font-size: 13px; gap: 12px; padding: 20px; text-align: center;
    }

    .preview-placeholder svg { opacity: 0.3; }

    .preview-canvas-wrap {
      width: 100%;
      background: white;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .preview-canvas-wrap canvas { width: 100%; display: block; }

    .preview-tabs {
      display: flex; gap: 1px;
      background: var(--border); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .preview-tabs button {
      flex: 1; background: var(--surface); border: none;
      color: var(--text-dim); padding: 9px 8px; font-size: 12px;
      cursor: pointer; transition: all 0.12s;
    }
    .preview-tabs button.active { background: var(--surface2); color: var(--text); }
    .preview-tabs button:hover:not(.active) { background: var(--surface2); }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </div>
    <h1>Quill</h1>
    <p>Entrez votre clé API pour accéder à l'éditeur PDF.</p>
    <input type="password" id="login-key" placeholder="Clé API" autocomplete="off" />
    <button id="login-btn">Se connecter</button>
    <div class="login-error" id="login-error">Clé incorrecte.</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    <h1>Quill</h1>
    <div class="spacer"></div>
    <span class="key-badge" id="key-display" title="Cliquer pour copier">••••••••</span>
    <button class="logout-btn" id="logout-btn">Déconnexion</button>
  </header>

  <div class="layout">
    <nav id="nav"></nav>
    <main id="main"></main>
    <div class="preview-panel">
      <div class="preview-tabs">
        <button class="active" data-tab="input" id="tab-input">Fichier source</button>
        <button data-tab="output" id="tab-output">Résultat</button>
      </div>
      <div class="preview-header">
        <span id="preview-label">Aperçu</span>
        <div class="page-controls">
          <button id="prev-page" disabled>‹</button>
          <span class="page-info" id="page-info">—</span>
          <button id="next-page" disabled>›</button>
        </div>
      </div>
      <div class="preview-body" id="preview-body">
        <div class="preview-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>Sélectionnez un fichier<br>pour voir l'aperçu</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
// ── PDF.js setup ──────────────────────────────────────────────────────────
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.mjs';

// ── State ─────────────────────────────────────────────────────────────────
let API_KEY = localStorage.getItem('quill_api_key') || '';
let previewDoc = null;
let previewPage = 1;
let activeTab = 'input';
let inputBlob = null;
let outputBlob = null;

// ── Auth ──────────────────────────────────────────────────────────────────
async function tryLogin(key) {
  const r = await fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({key}),
  });
  return r.ok;
}

async function init() {
  if (API_KEY) {
    const ok = await tryLogin(API_KEY).catch(() => false);
    if (ok) { showApp(); return; }
    localStorage.removeItem('quill_api_key');
    API_KEY = '';
  }
  document.getElementById('login-screen').style.display = 'flex';
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const key = document.getElementById('login-key').value.trim();
  if (!key) return;
  const ok = await tryLogin(key).catch(() => false);
  if (ok) {
    API_KEY = key;
    localStorage.setItem('quill_api_key', key);
    document.getElementById('login-error').style.display = 'none';
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
});

document.getElementById('login-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const masked = API_KEY.slice(0, 4) + '••••' + API_KEY.slice(-4);
  document.getElementById('key-display').textContent = masked;
}

document.getElementById('key-display').addEventListener('click', () => {
  navigator.clipboard.writeText(API_KEY);
  const el = document.getElementById('key-display');
  el.textContent = 'Copié !';
  setTimeout(() => {
    const masked = API_KEY.slice(0, 4) + '••••' + API_KEY.slice(-4);
    el.textContent = masked;
  }, 1500);
});

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('quill_api_key');
  API_KEY = '';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-key').value = '';
});

// ── Preview ───────────────────────────────────────────────────────────────
document.getElementById('tab-input').addEventListener('click', () => switchTab('input'));
document.getElementById('tab-output').addEventListener('click', () => switchTab('output'));

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-input').classList.toggle('active', tab === 'input');
  document.getElementById('tab-output').classList.toggle('active', tab === 'output');
  const blob = tab === 'input' ? inputBlob : outputBlob;
  if (blob) renderPDF(blob);
  else showPlaceholder(tab === 'output' ? 'Le résultat apparaîtra ici' : 'Sélectionnez un fichier\npour voir l\'aperçu');
}

async function renderPDF(blob) {
  const body = document.getElementById('preview-body');
  body.innerHTML = '<div class="preview-placeholder"><span>Chargement…</span></div>';

  try {
    const ab = await blob.arrayBuffer();
    const doc = await pdfjsLib.getDocument({data: ab}).promise;
    previewDoc = doc;
    previewPage = 1;
    updatePageControls();
    await renderPage(previewPage);
  } catch (e) {
    body.innerHTML = '<div class="preview-placeholder"><span>Aperçu non disponible<br><small style="opacity:.5">' + e.message + '</small></span></div>';
  }
}

async function renderPage(num) {
  const body = document.getElementById('preview-body');
  body.innerHTML = '';
  const page = await previewDoc.getPage(num);
  const vp = page.getViewport({scale: 1});
  const scale = (body.clientWidth - 32) / vp.width;
  const viewport = page.getViewport({scale});

  const wrap = document.createElement('div');
  wrap.className = 'preview-canvas-wrap';
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  wrap.appendChild(canvas);
  body.appendChild(wrap);

  await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
  document.getElementById('page-info').textContent = `${num} / ${previewDoc.numPages}`;
}

function updatePageControls() {
  const total = previewDoc?.numPages || 0;
  document.getElementById('prev-page').disabled = previewPage <= 1;
  document.getElementById('next-page').disabled = previewPage >= total;
  document.getElementById('page-info').textContent = total ? `${previewPage} / ${total}` : '—';
}

document.getElementById('prev-page').addEventListener('click', async () => {
  if (previewPage > 1) { previewPage--; updatePageControls(); await renderPage(previewPage); }
});
document.getElementById('next-page').addEventListener('click', async () => {
  if (previewDoc && previewPage < previewDoc.numPages) { previewPage++; updatePageControls(); await renderPage(previewPage); }
});

function showPlaceholder(msg = '') {
  previewDoc = null;
  document.getElementById('preview-body').innerHTML = `
    <div class="preview-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span>${msg.replace(/\n/g, '<br>')}</span>
    </div>`;
  document.getElementById('page-info').textContent = '—';
  document.getElementById('prev-page').disabled = true;
  document.getElementById('next-page').disabled = true;
}

// ── Panels definition ─────────────────────────────────────────────────────
const PANELS = [
  { group: "Basique", items: [
    { id:"merge", label:"Fusionner", desc:"Combiner plusieurs PDFs en un seul.", endpoint:"/basic/merge", responseType:"blob",
      fields:[{name:"files",label:"Fichiers PDF",type:"file",multiple:true,accept:".pdf"}], downloadName:"merged.pdf" },
    { id:"split", label:"Diviser", desc:"Découper un PDF en plusieurs fichiers.", endpoint:"/basic/split", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"ranges",label:"Plages (optionnel)",type:"text",placeholder:"ex: 1-3,5-7"}], downloadName:"split.zip" },
    { id:"rotate", label:"Rotation", desc:"Faire pivoter des pages.", endpoint:"/basic/rotate", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"degrees",label:"Degrés",type:"select",options:["90","180","270"]},{name:"pages",label:"Pages (optionnel)",type:"text",placeholder:"1,3,5"}], downloadName:"rotated.pdf" },
    { id:"delete-pages", label:"Supprimer pages", desc:"Retirer des pages du document.", endpoint:"/basic/delete-pages", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"pages",label:"Pages à supprimer",type:"text",placeholder:"2,4,6"}], downloadName:"output.pdf" },
    { id:"info", label:"Métadonnées", desc:"Lire les informations d'un PDF.", endpoint:"/basic/info", responseType:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
    { id:"extract-text", label:"Extraire texte", desc:"Extraire le texte brut d'un PDF.", endpoint:"/basic/extract-text", responseType:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"pages",label:"Pages (optionnel)",type:"text",placeholder:"1,2"}] },
  ]},
  { group: "Sécurité", items: [
    { id:"encrypt", label:"Chiffrer", desc:"Protéger un PDF par mot de passe.", endpoint:"/security/encrypt", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"password",label:"Mot de passe",type:"text",placeholder:"••••••••"}], downloadName:"encrypted.pdf" },
    { id:"decrypt", label:"Déchiffrer", desc:"Retirer la protection d'un PDF.", endpoint:"/security/decrypt", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"password",label:"Mot de passe",type:"text",placeholder:"••••••••"}], downloadName:"decrypted.pdf" },
  ]},
  { group: "Annotations", items: [
    { id:"watermark", label:"Filigrane", desc:"Ajouter un filigrane textuel diagonal.", endpoint:"/annotations/watermark", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"text",label:"Texte",type:"text",placeholder:"CONFIDENTIEL"},{name:"opacity",label:"Opacité",type:"text",placeholder:"0.15"},{name:"angle",label:"Angle",type:"text",placeholder:"45"}], downloadName:"watermarked.pdf" },
    { id:"stamp", label:"Tampon", desc:"Apposer un tampon (APPROUVÉ, BROUILLON…).", endpoint:"/annotations/stamp", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"label",label:"Texte du tampon",type:"text",placeholder:"CONFIDENTIEL"},{name:"pages",label:"Pages (optionnel)",type:"text",placeholder:"1,2"}], downloadName:"stamped.pdf" },
    { id:"add-text", label:"Ajouter texte", desc:"Insérer du texte libre à une position.", endpoint:"/annotations/add-text", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"text",label:"Texte",type:"text",placeholder:"Mon annotation"},{name:"x",label:"X (pt)",type:"text",placeholder:"50"},{name:"y",label:"Y (pt)",type:"text",placeholder:"100"},{name:"pages",label:"Pages (optionnel)",type:"text",placeholder:"1,3"}], downloadName:"annotated.pdf" },
    { id:"page-numbers", label:"Numéroter pages", desc:"Ajouter la numérotation automatique.", endpoint:"/annotations/page-numbers", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"position",label:"Position",type:"select",options:["bottom-center","bottom-right","bottom-left","top-center","top-right","top-left"]},{name:"prefix",label:"Préfixe",type:"text",placeholder:"Page "},{name:"start",label:"Numéro de départ",type:"text",placeholder:"1"}], downloadName:"numbered.pdf" },
  ]},
  { group: "Extraction", items: [
    { id:"extract-tables", label:"Tableaux", desc:"Extraire les tableaux en CSV ou Excel.", endpoint:"/extraction/tables", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"fmt",label:"Format",type:"select",options:["csv","excel"]},{name:"pages",label:"Pages (optionnel)",type:"text",placeholder:"1,3"}], downloadName:"tables" },
    { id:"extract-images-api", label:"Images", desc:"Extraire les images embarquées.", endpoint:"/extraction/images", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}], downloadName:"images.zip" },
    { id:"extract-links", label:"Liens", desc:"Lister tous les hyperliens.", endpoint:"/extraction/links", responseType:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
    { id:"detect-lang", label:"Langue", desc:"Détecter la langue du document.", endpoint:"/extraction/language", responseType:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
  ]},
  { group: "Formulaires", items: [
    { id:"list-fields-api", label:"Lister champs", desc:"Afficher les champs interactifs.", endpoint:"/forms/list", responseType:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
    { id:"fill-form-api", label:"Remplir formulaire", desc:'Remplir les champs (JSON).', endpoint:"/forms/fill", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"data",label:'Données JSON',type:"textarea",placeholder:'{"name": "Alice", "email": "alice@example.com"}'}], downloadName:"filled.pdf" },
    { id:"flatten-form-api", label:"Aplatir formulaire", desc:"Rendre les champs non éditables.", endpoint:"/forms/flatten", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}], downloadName:"flattened.pdf" },
  ]},
  { group: "Conversions", items: [
    { id:"to-images-api", label:"PDF → Images", desc:"Convertir les pages en PNG ou JPEG.", endpoint:"/convert/to-images", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"fmt",label:"Format",type:"select",options:["png","jpg"]},{name:"dpi",label:"DPI",type:"text",placeholder:"150"}], downloadName:"pages.zip" },
    { id:"from-images-api", label:"Images → PDF", desc:"Combiner des images en un seul PDF.", endpoint:"/convert/from-images", responseType:"blob",
      fields:[{name:"files",label:"Images",type:"file",multiple:true,accept:"image/*"}], downloadName:"combined.pdf" },
    { id:"to-markdown-api", label:"PDF → Markdown", desc:"Convertir un PDF en Markdown.", endpoint:"/convert/to-markdown", responseType:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}], downloadName:"doc.md" },
    { id:"to-json-api", label:"PDF → JSON", desc:"Extraire la mise en page en JSON.", endpoint:"/convert/to-json", responseType:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"pages",label:"Pages (optionnel)",type:"text",placeholder:"1,2"}] },
  ]},
];

// ── Build UI ──────────────────────────────────────────────────────────────
const nav = document.getElementById('nav');
const mainEl = document.getElementById('main');

PANELS.forEach(group => {
  const lbl = document.createElement('div');
  lbl.className = 'group-label';
  lbl.textContent = group.group;
  nav.appendChild(lbl);

  group.items.forEach(item => {
    const btn = document.createElement('button');
    btn.textContent = item.label;
    btn.dataset.id = item.id;
    btn.addEventListener('click', () => activate(item.id));
    nav.appendChild(btn);
    mainEl.appendChild(buildPanel(item));
  });
});

function buildPanel(item) {
  const div = document.createElement('div');
  div.id = 'panel-' + item.id;
  div.className = 'panel';
  div.innerHTML = `<h2>${item.label}</h2><p class="desc">${item.desc}</p>
    <form class="form-grid" id="form-${item.id}"></form>
    <div class="result" id="result-${item.id}"></div>
    <pre class="json-result" id="json-${item.id}"></pre>`;

  const form = div.querySelector('form');
  item.fields.forEach(f => form.appendChild(buildField(f, item)));
  const btn = document.createElement('button');
  btn.type = 'submit'; btn.className = 'submit'; btn.textContent = 'Lancer';
  form.appendChild(btn);
  form.addEventListener('submit', e => { e.preventDefault(); submitForm(item, form); });
  return div;
}

function buildField(f, item) {
  const wrap = document.createElement('label');
  const strong = document.createElement('strong');
  strong.textContent = f.label;
  wrap.appendChild(strong);

  if (f.type === 'file') {
    wrap.appendChild(createDropZone(f, item));
  } else if (f.type === 'select') {
    const sel = document.createElement('select');
    sel.name = f.name;
    f.options.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; sel.appendChild(opt); });
    wrap.appendChild(sel);
  } else if (f.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.name = f.name; ta.placeholder = f.placeholder || '';
    wrap.appendChild(ta);
  } else {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.name = f.name; inp.placeholder = f.placeholder || '';
    wrap.appendChild(inp);
  }
  return wrap;
}

// ── Drop zone ─────────────────────────────────────────────────────────────
function createDropZone(f, item) {
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  dz.dataset.name = f.name;
  dz.dataset.multiple = f.multiple || false;

  const input = document.createElement('input');
  input.type = 'file';
  input.name = f.name;
  input.accept = f.accept || '';
  if (f.multiple) input.multiple = true;

  dz.innerHTML = `
    <div class="dz-icon">📄</div>
    <div class="dz-text"><strong>Cliquer</strong> ou glisser-déposer</div>
    <div class="dz-text" style="font-size:11px;margin-top:3px;color:var(--text-dim)">${f.accept || 'tous fichiers'}</div>
    <div class="dz-files" id="dz-files-${item.id}-${f.name}"></div>`;
  dz.appendChild(input);

  const fileList = dz.querySelector('.dz-files');

  function renderFiles(files) {
    fileList.innerHTML = '';
    Array.from(files).forEach((file, i) => {
      const row = document.createElement('div');
      row.className = 'dz-file-item';
      row.innerHTML = `<span>📎 ${file.name}</span><span style="color:var(--text-dim);font-size:11px">${(file.size/1024).toFixed(0)} KB</span>
        <button class="dz-remove" type="button" data-idx="${i}">✕</button>`;
      fileList.appendChild(row);
    });
    // Preview first PDF on input tab
    const firstPdf = Array.from(files).find(f => f.name.endsWith('.pdf'));
    if (firstPdf) {
      inputBlob = firstPdf;
      outputBlob = null;
      switchTab('input');
    }
  }

  input.addEventListener('change', () => {
    renderFiles(input.files);
  });

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    const dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach(file => dt.items.add(file));
    input.files = dt.files;
    renderFiles(input.files);
  });

  return dz;
}

// ── Submit ────────────────────────────────────────────────────────────────
async function submitForm(item, form) {
  const btn = form.querySelector('button.submit');
  const resultEl = document.getElementById('result-' + item.id);
  const jsonEl = document.getElementById('json-' + item.id);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Traitement…';
  resultEl.className = 'result';
  resultEl.textContent = '';
  jsonEl.style.display = 'none';

  try {
    const fd = new FormData(form);
    const resp = await fetch(item.endpoint, {
      method: 'POST',
      headers: {'X-API-Key': API_KEY},
      body: fd,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({detail: resp.statusText}));
      throw new Error(err.detail || resp.statusText);
    }

    if (item.responseType === 'blob') {
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const ct = resp.headers.get('content-type') || '';
      const name = item.downloadName || 'output';
      const ext = ct.includes('zip') ? '.zip' : ct.includes('json') ? '.json' : ct.includes('markdown') || ct.includes('text/plain') ? (name.endsWith('.md') ? '' : '.md') : name.includes('.') ? '' : '.pdf';
      const filename = name.endsWith(ext) ? name : name + ext;

      resultEl.innerHTML = `✓ Succès — <a href="${url}" download="${filename}">Télécharger ${filename}</a>`;
      resultEl.className = 'result success';

      // Show output preview if PDF
      if (ct.includes('pdf') || filename.endsWith('.pdf')) {
        outputBlob = blob;
        switchTab('output');
      }
    } else {
      const data = await resp.json();
      jsonEl.textContent = JSON.stringify(data, null, 2);
      jsonEl.style.display = 'block';
      resultEl.textContent = '✓ Résultat ci-dessous';
      resultEl.className = 'result success';
    }
  } catch (err) {
    resultEl.textContent = '✗ Erreur : ' + err.message;
    resultEl.className = 'result error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Lancer';
  }
}

// ── Navigation ────────────────────────────────────────────────────────────
function activate(id) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`nav button[data-id="${id}"]`).classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

activate(PANELS[0].items[0].id);
showPlaceholder('Sélectionnez un fichier\npour voir l\'aperçu');
init();
</script>
