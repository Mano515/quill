<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quill — PDF Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --surface3: #2a2f4a;
      --border: #2e3250; --accent: #6c63ff; --accent-h: #8880ff; --accent-dim: rgba(108,99,255,.12);
      --text: #e2e4f0; --dim: #7b7f9e; --ok: #4ade80; --err: #f87171; --radius: 10px;
    }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; min-height:100vh; }

    /* ── Login ── */
    #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 44px; width:360px; text-align:center; }
    .login-box .llogo { width:48px;height:48px;background:var(--accent-dim);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--accent); }
    .login-box h1 { font-size:22px;margin-bottom:6px; }
    .login-box p { color:var(--dim);font-size:13px;margin-bottom:24px; }
    .login-box input { width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 14px;font-size:14px;font-family:monospace;outline:none;margin-bottom:14px;letter-spacing:2px;text-align:center; }
    .login-box input:focus { border-color:var(--accent); }
    .login-box button { width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:11px;font-size:14px;font-weight:600;cursor:pointer; }
    .login-box button:hover { background:var(--accent-h); }
    .login-err { color:var(--err);font-size:12px;margin-top:10px;display:none; }

    /* ── Shell ── */
    #app { display:none; flex-direction:column; height:100vh; }
    #app.visible { display:flex; }
    header { padding:13px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0; }
    header h1 { font-size:18px;font-weight:700; }
    header .sp { flex:1; }
    .key-badge { font-size:11px;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:monospace;cursor:pointer;transition:border-color .15s; }
    .key-badge:hover { border-color:var(--accent); }
    .logout-btn { background:none;border:1px solid var(--border);color:var(--dim);border-radius:var(--radius);padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s; }
    .logout-btn:hover { color:var(--err);border-color:var(--err); }

    /* ── Layout ── */
    .layout { display:grid;grid-template-columns:210px 1fr 330px;flex:1;overflow:hidden; }
    nav { background:var(--surface);border-right:1px solid var(--border);padding:10px 0;overflow-y:auto; }
    .group-label { font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);padding:12px 16px 4px; }
    nav button { display:block;width:100%;text-align:left;background:none;border:none;border-left:3px solid transparent;color:var(--dim);padding:7px 16px;cursor:pointer;font-size:13px;transition:all .12s; }
    nav button:hover { color:var(--text);background:var(--surface2); }
    nav button.active { color:var(--accent);border-left-color:var(--accent);background:var(--surface2); }
    main { padding:22px 26px;overflow-y:auto; }
    .panel { display:none; }
    .panel.active { display:block; }
    h2 { font-size:17px;font-weight:700;margin-bottom:4px; }
    .desc { color:var(--dim);font-size:13px;margin-bottom:20px; }
    .form-grid { display:grid;gap:14px;max-width:530px; }
    label { display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--dim); }
    label strong { color:var(--text);font-size:13px; }
    input[type="text"],select,textarea { background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;width:100%;outline:none;transition:border-color .15s; }
    input:focus,select:focus,textarea:focus { border-color:var(--accent); }
    textarea { resize:vertical;min-height:80px; }

    /* ── Drop zone ── */
    .drop-zone { border:2px dashed var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center;cursor:pointer;transition:all .15s;position:relative;background:var(--surface2); }
    .drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent);background:var(--accent-dim); }
    .drop-zone input[type="file"] { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
    .dz-text { color:var(--dim);font-size:13px; }
    .dz-text strong { color:var(--accent); }
    .dz-hint { font-size:11px;color:var(--dim);margin-top:3px; }
    .dz-files { margin-top:10px;display:flex;flex-direction:column;gap:4px; }
    .dz-file-item { background:var(--surface3);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px; }
    .dz-file-item .sz { color:var(--dim);font-size:11px;margin-left:auto; }

    /* ── Pages picker ── */
    .pages-picker { background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px; }
    .pages-picker .pp-hint { font-size:12px;color:var(--dim);margin-bottom:10px; }
    .pp-grid { display:flex;flex-wrap:wrap;gap:8px; }
    .pp-thumb { position:relative;cursor:pointer;border-radius:6px;overflow:hidden;border:2px solid var(--border);transition:all .15s;flex-shrink:0; }
    .pp-thumb:hover { border-color:var(--accent-h); }
    .pp-thumb.selected { border-color:var(--accent); }
    .pp-thumb canvas { display:block;width:64px;height:84px;background:#fff; }
    .pp-thumb .pp-num { position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:10px;text-align:center;padding:2px 0; }
    .pp-thumb .pp-check { position:absolute;top:4px;right:4px;width:16px;height:16px;background:var(--accent);border-radius:3px;display:none;align-items:center;justify-content:center; }
    .pp-thumb.selected .pp-check { display:flex; }
    .pp-thumb .pp-check::after { content:'✓';color:#fff;font-size:10px;line-height:1; }
    /* drag handle for reorder */
    .pp-thumb.draggable { cursor:grab; }
    .pp-thumb.draggable:active { cursor:grabbing; }
    .pp-thumb.drag-target { border-color:var(--ok);background:rgba(74,222,128,.1); }
    .pp-empty { color:var(--dim);font-size:12px;padding:8px 0; }

    /* ── XY picker ── */
    .xy-hint { font-size:12px;color:var(--accent);margin-top:4px;display:none; }
    .xy-hint.visible { display:block; }

    /* ── Chain pill ── */
    #chain-pill {
      position:fixed;bottom:24px;right:356px;
      background:var(--accent);color:#fff;
      border:none;border-radius:24px;
      padding:10px 20px;font-size:13px;font-weight:600;
      cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,.4);
      display:none;align-items:center;gap:8px;
      transition:all .2s;z-index:100;
    }
    #chain-pill:hover { background:var(--accent-h);transform:translateY(-1px); }
    #chain-pill.visible { display:flex; }
    #chain-pill .chain-arrow { font-size:16px; }

    /* chain target overlay */
    #chain-overlay { display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);align-items:center;justify-content:center; }
    #chain-overlay.visible { display:flex; }
    .chain-modal { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:480px;max-height:70vh;overflow-y:auto; }
    .chain-modal h3 { margin-bottom:16px;font-size:15px; }
    .chain-ops { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
    .chain-op-btn { background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;text-align:left;cursor:pointer;font-size:13px;transition:all .12s; }
    .chain-op-btn:hover { border-color:var(--accent);color:var(--accent); }
    .chain-cancel { margin-top:14px;width:100%;background:none;border:1px solid var(--border);color:var(--dim);border-radius:8px;padding:8px;cursor:pointer;font-size:13px; }
    .chain-cancel:hover { color:var(--text); }

    /* ── Submit ── */
    button.submit { background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;width:fit-content; }
    button.submit:hover { background:var(--accent-h); }
    button.submit:disabled { opacity:.5;cursor:not-allowed; }
    .result { margin-top:16px;padding:12px 16px;border-radius:var(--radius);font-size:13px;display:none; }
    .result.success { background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:var(--ok);display:block; }
    .result.error { background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--err);display:block; }
    .result a { color:var(--accent);font-weight:600;text-decoration:none; }
    .result a:hover { text-decoration:underline; }
    .json-out { margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;display:none;color:var(--dim); }
    .spinner { display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Preview panel ── */
    .preview-panel { border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden; }
    .preview-tabs { display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0; }
    .preview-tabs button { flex:1;background:var(--surface);border:none;color:var(--dim);padding:9px 8px;font-size:12px;cursor:pointer;transition:all .12s; }
    .preview-tabs button.active { background:var(--surface2);color:var(--text); }
    .preview-tabs button:hover:not(.active) { background:var(--surface2); }
    .preview-header { padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px;flex-shrink:0; }
    .page-controls { margin-left:auto;display:flex;align-items:center;gap:6px; }
    .page-controls button { background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:12px;transition:all .12s; }
    .page-controls button:hover:not(:disabled) { border-color:var(--accent);color:var(--accent); }
    .page-controls button:disabled { opacity:.4;cursor:not-allowed; }
    .page-info { font-size:12px;color:var(--dim);min-width:50px;text-align:center; }
    .xy-indicator { font-size:11px;color:var(--accent);padding:4px 14px;border-bottom:1px solid var(--border);display:none;flex-shrink:0; }
    .xy-indicator.visible { display:block; }
    .preview-body { flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px; }
    .preview-placeholder { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:13px;gap:12px;text-align:center; }
    .preview-placeholder svg { opacity:.3; }
    .canvas-wrap { width:100%;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.4);position:relative;cursor:crosshair; }
    .canvas-wrap.normal-cursor { cursor:default; }
    .canvas-wrap canvas { width:100%;display:block; }
    .xy-crosshair { position:absolute;pointer-events:none;display:none; }
    .xy-crosshair.visible { display:block; }
    .xy-crosshair::before,.xy-crosshair::after { content:'';position:absolute;background:rgba(108,99,255,.7); }
    .xy-crosshair::before { width:1px;height:14px;top:-7px;left:0; }
    .xy-crosshair::after { width:14px;height:1px;top:0;left:-7px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="llogo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </div>
    <h1>Quill</h1>
    <p>Entrez votre clé API pour accéder à l'éditeur PDF.</p>
    <input type="password" id="login-key" placeholder="Clé API" autocomplete="off" />
    <button id="login-btn">Se connecter</button>
    <div class="login-err" id="login-err">Clé incorrecte.</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    <h1>Quill</h1>
    <div class="sp"></div>
    <span class="key-badge" id="key-display" title="Cliquer pour copier">••••••••</span>
    <button class="logout-btn" id="logout-btn">Déconnexion</button>
  </header>

  <div class="layout">
    <nav id="nav"></nav>
    <main id="main"></main>

    <div class="preview-panel">
      <div class="preview-tabs">
        <button class="active" id="tab-input">Fichier source</button>
        <button id="tab-output">Résultat</button>
      </div>
      <div class="preview-header">
        <span>Aperçu</span>
        <div class="page-controls">
          <button id="prev-page" disabled>‹</button>
          <span class="page-info" id="page-info">—</span>
          <button id="next-page" disabled>›</button>
        </div>
      </div>
      <div class="xy-indicator" id="xy-indicator">🎯 Cliquez sur l'aperçu pour placer l'élément</div>
      <div class="preview-body" id="preview-body">
        <div class="preview-placeholder">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>Sélectionnez un fichier<br>pour voir l'aperçu</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Chain pill -->
<button id="chain-pill"><span class="chain-arrow">⤵</span> Utiliser ce résultat…</button>

<!-- Chain overlay -->
<div id="chain-overlay">
  <div class="chain-modal">
    <h3>Envoyer le résultat vers…</h3>
    <div class="chain-ops" id="chain-ops"></div>
    <button class="chain-cancel" id="chain-cancel">Annuler</button>
  </div>
</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.worker.min.mjs';

// ── Global state ──────────────────────────────────────────────────────────
let API_KEY = localStorage.getItem('quill_api_key') || '';
let previewDoc = null, previewPage = 1, activeTab = 'input';
let inputBlob = null, outputBlob = null;
let lastOutputBlob = null;           // for chaining
let xyMode = false;                  // click-to-position active
let xyTargetX = null, xyTargetY = null; // input elements to fill
let xyViewport = null;               // current page viewport for coord mapping
let thumbCache = {};                 // pageNum → canvas dataURL

// ── PANELS definition ─────────────────────────────────────────────────────
const PANELS = [
  { group:"Basique", items:[
    { id:"merge",   label:"Fusionner",      desc:"Combiner plusieurs PDFs en un seul.",   endpoint:"/basic/merge",   rtype:"blob",
      fields:[{name:"files",label:"Fichiers PDF",type:"file",multiple:true,accept:".pdf"}], dl:"merged.pdf" },
    { id:"split",   label:"Diviser",        desc:"Découper un PDF par plages de pages.",  endpoint:"/basic/split",   rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"ranges",label:"Plages (optionnel)",type:"pages-picker",mode:"ranges",hint:"Laisser vide = une page par fichier"}], dl:"split.zip" },
    { id:"rotate",  label:"Rotation",       desc:"Faire pivoter des pages.",              endpoint:"/basic/rotate",  rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"degrees",label:"Degrés",type:"select",options:["90","180","270"]},{name:"pages",label:"Pages à pivoter (optionnel)",type:"pages-picker",mode:"select"}], dl:"rotated.pdf" },
    { id:"reorder", label:"Réordonner",     desc:"Glissez les miniatures pour réordonner.", endpoint:"/basic/reorder", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"order",label:"Ordre des pages",type:"pages-picker",mode:"reorder"}], dl:"reordered.pdf" },
    { id:"delete-pages", label:"Supprimer pages", desc:"Cocher les pages à supprimer.", endpoint:"/basic/delete-pages", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"pages",label:"Pages à supprimer",type:"pages-picker",mode:"select"}], dl:"output.pdf" },
    { id:"info",    label:"Métadonnées",    desc:"Lire les informations d'un PDF.",       endpoint:"/basic/info",    rtype:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
    { id:"extract-text", label:"Extraire texte", desc:"Extraire le texte brut d'un PDF.", endpoint:"/basic/extract-text", rtype:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"pages",label:"Pages (optionnel)",type:"pages-picker",mode:"select"}] },
  ]},
  { group:"Sécurité", items:[
    { id:"encrypt", label:"Chiffrer",   desc:"Protéger un PDF par mot de passe.", endpoint:"/security/encrypt", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"password",label:"Mot de passe",type:"text",placeholder:"••••••••"}], dl:"encrypted.pdf" },
    { id:"decrypt", label:"Déchiffrer", desc:"Retirer la protection d'un PDF.",   endpoint:"/security/decrypt", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"password",label:"Mot de passe",type:"text",placeholder:"••••••••"}], dl:"decrypted.pdf" },
  ]},
  { group:"Annotations", items:[
    { id:"watermark",   label:"Filigrane",     desc:"Ajouter un filigrane textuel diagonal.", endpoint:"/annotations/watermark", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"text",label:"Texte",type:"text",placeholder:"CONFIDENTIEL"},{name:"opacity",label:"Opacité",type:"text",placeholder:"0.15"},{name:"angle",label:"Angle",type:"text",placeholder:"45"}], dl:"watermarked.pdf" },
    { id:"stamp",       label:"Tampon",        desc:"Apposer un tampon. Cliquez sur l'aperçu pour positionner.", endpoint:"/annotations/stamp", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"label",label:"Texte du tampon",type:"text",placeholder:"CONFIDENTIEL"},{name:"pages",label:"Pages (optionnel)",type:"pages-picker",mode:"select"}], dl:"stamped.pdf" },
    { id:"add-text",    label:"Ajouter texte", desc:"Cliquez sur l'aperçu pour placer le texte.", endpoint:"/annotations/add-text", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"text",label:"Texte",type:"text",placeholder:"Mon annotation"},{name:"x",label:"X (pt)",type:"xy",axis:"x",placeholder:"50"},{name:"y",label:"Y (pt)",type:"xy",axis:"y",placeholder:"100"},{name:"pages",label:"Pages (optionnel)",type:"pages-picker",mode:"select"}], dl:"annotated.pdf" },
    { id:"page-numbers",label:"Numéroter",    desc:"Ajouter la numérotation automatique.",      endpoint:"/annotations/page-numbers", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"position",label:"Position",type:"select",options:["bottom-center","bottom-right","bottom-left","top-center","top-right","top-left"]},{name:"prefix",label:"Préfixe",type:"text",placeholder:"Page "},{name:"start",label:"Numéro de départ",type:"text",placeholder:"1"}], dl:"numbered.pdf" },
  ]},
  { group:"Extraction", items:[
    { id:"extract-tables",    label:"Tableaux",  desc:"Extraire les tableaux en CSV ou Excel.", endpoint:"/extraction/tables",   rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"fmt",label:"Format",type:"select",options:["csv","excel"]},{name:"pages",label:"Pages (optionnel)",type:"pages-picker",mode:"select"}], dl:"tables" },
    { id:"extract-images-api",label:"Images",    desc:"Extraire les images embarquées.",        endpoint:"/extraction/images",   rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}], dl:"images.zip" },
    { id:"extract-links",     label:"Liens",     desc:"Lister tous les hyperliens.",            endpoint:"/extraction/links",    rtype:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
    { id:"detect-lang",       label:"Langue",    desc:"Détecter la langue du document.",        endpoint:"/extraction/language", rtype:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
  ]},
  { group:"Formulaires", items:[
    { id:"list-fields-api",  label:"Lister champs",    desc:"Afficher les champs interactifs.", endpoint:"/forms/list",    rtype:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}] },
    { id:"fill-form-api",    label:"Remplir formulaire",desc:'Remplir les champs (JSON).',      endpoint:"/forms/fill",    rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"data",label:'Données JSON',type:"textarea",placeholder:'{"name":"Alice","email":"alice@x.com"}'}], dl:"filled.pdf" },
    { id:"flatten-form-api", label:"Aplatir formulaire",desc:"Rendre les champs non éditables.",endpoint:"/forms/flatten", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}], dl:"flattened.pdf" },
  ]},
  { group:"Conversions", items:[
    { id:"to-images-api",   label:"PDF → Images",   desc:"Convertir les pages en PNG ou JPEG.", endpoint:"/convert/to-images",   rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"fmt",label:"Format",type:"select",options:["png","jpg"]},{name:"dpi",label:"DPI",type:"text",placeholder:"150"}], dl:"pages.zip" },
    { id:"from-images-api", label:"Images → PDF",   desc:"Combiner des images en un seul PDF.", endpoint:"/convert/from-images", rtype:"blob",
      fields:[{name:"files",label:"Images",type:"file",multiple:true,accept:"image/*"}], dl:"combined.pdf" },
    { id:"to-markdown-api", label:"PDF → Markdown", desc:"Convertir un PDF en Markdown.",       endpoint:"/convert/to-markdown", rtype:"blob",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"}], dl:"doc.md" },
    { id:"to-json-api",     label:"PDF → JSON",     desc:"Extraire la mise en page en JSON.",   endpoint:"/convert/to-json",     rtype:"json",
      fields:[{name:"file",label:"Fichier PDF",type:"file",accept:".pdf"},{name:"pages",label:"Pages (optionnel)",type:"pages-picker",mode:"select"}] },
  ]},
];

// ── Build nav & panels ────────────────────────────────────────────────────
const navEl = document.getElementById('nav');
const mainEl = document.getElementById('main');

PANELS.forEach(group => {
  const lbl = document.createElement('div');
  lbl.className = 'group-label';
  lbl.textContent = group.group;
  navEl.appendChild(lbl);
  group.items.forEach(item => {
    const btn = document.createElement('button');
    btn.textContent = item.label;
    btn.dataset.id = item.id;
    btn.onclick = () => activate(item.id);
    navEl.appendChild(btn);
    mainEl.appendChild(buildPanel(item));
  });
});

function buildPanel(item) {
  const div = document.createElement('div');
  div.id = 'panel-' + item.id;
  div.className = 'panel';
  div.innerHTML = `<h2>${item.label}</h2><p class="desc">${item.desc}</p>
    <form class="form-grid" id="form-${item.id}"></form>
    <div class="result" id="result-${item.id}"></div>
    <pre class="json-out" id="json-${item.id}"></pre>`;
  const form = div.querySelector('form');
  let hasXY = false;
  item.fields.forEach(f => {
    const wrap = buildField(f, item);
    form.appendChild(wrap);
    if (f.type === 'xy') hasXY = true;
  });
  if (hasXY) {
    const hint = document.createElement('div');
    hint.className = 'xy-hint visible';
    hint.id = 'xy-hint-' + item.id;
    hint.textContent = '🎯 Cliquez sur l\'aperçu pour placer le texte automatiquement';
    form.appendChild(hint);
  }
  const btn = document.createElement('button');
  btn.type = 'submit'; btn.className = 'submit'; btn.textContent = 'Lancer';
  form.appendChild(btn);
  form.onsubmit = e => { e.preventDefault(); submitForm(item, form); };
  return div;
}

function buildField(f, item) {
  const wrap = document.createElement('label');
  const strong = document.createElement('strong');
  strong.textContent = f.label;
  wrap.appendChild(strong);

  if (f.type === 'file') {
    wrap.appendChild(buildDropZone(f, item));
  } else if (f.type === 'pages-picker') {
    const picker = buildPagesPicker(f, item);
    wrap.appendChild(picker);
  } else if (f.type === 'select') {
    const sel = document.createElement('select');
    sel.name = f.name;
    (f.options || []).forEach(o => { const opt = new Option(o, o); sel.appendChild(opt); });
    wrap.appendChild(sel);
  } else if (f.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.name = f.name; ta.placeholder = f.placeholder || '';
    wrap.appendChild(ta);
  } else if (f.type === 'xy') {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.name = f.name; inp.placeholder = f.placeholder || '';
    inp.dataset.axis = f.axis;
    inp.id = `xy-${item.id}-${f.axis}`;
    wrap.appendChild(inp);
  } else {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.name = f.name; inp.placeholder = f.placeholder || '';
    wrap.appendChild(inp);
  }
  return wrap;
}

// ── Drop zone ─────────────────────────────────────────────────────────────
function buildDropZone(f, item) {
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  const inp = document.createElement('input');
  inp.type = 'file'; inp.name = f.name; inp.accept = f.accept || '';
  if (f.multiple) inp.multiple = true;
  dz.innerHTML = `<div class="dz-text"><strong>Cliquer</strong> ou glisser-déposer</div>
    <div class="dz-hint">${f.accept || 'tous fichiers'}${f.multiple ? ' — plusieurs fichiers' : ''}</div>
    <div class="dz-files" id="dzf-${item.id}-${f.name}"></div>`;
  dz.appendChild(inp);

  const fileList = dz.querySelector('.dz-files');
  const onFiles = files => {
    fileList.innerHTML = '';
    Array.from(files).forEach(file => {
      const row = document.createElement('div');
      row.className = 'dz-file-item';
      row.innerHTML = `<span>📎 ${file.name}</span><span class="sz">${(file.size/1024).toFixed(0)} KB</span>`;
      fileList.appendChild(row);
    });
    const pdf = Array.from(files).find(f => f.name.toLowerCase().endsWith('.pdf'));
    if (pdf) {
      inputBlob = pdf;
      outputBlob = null;
      thumbCache = {};
      switchTab('input');
      // Refresh page pickers in this panel
      refreshPickersForPanel(item.id, pdf);
    }
  };
  inp.onchange = () => onFiles(inp.files);
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');
  dz.ondrop = e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
    inp.files = dt.files;
    onFiles(inp.files);
  };
  return dz;
}

// ── Pages picker ──────────────────────────────────────────────────────────
function buildPagesPicker(f, item) {
  const wrap = document.createElement('div');
  wrap.className = 'pages-picker';
  wrap.id = `pp-${item.id}-${f.name}`;
  wrap.dataset.mode = f.mode;
  wrap.dataset.fieldName = f.name;

  const hint = document.createElement('div');
  hint.className = 'pp-hint';
  hint.textContent = f.hint || (f.mode === 'reorder' ? 'Glissez les pages pour les réordonner' : f.mode === 'select' ? 'Cochez les pages à cibler (laisser vide = toutes)' : 'Cochez les pages à inclure');
  wrap.appendChild(hint);

  const grid = document.createElement('div');
  grid.className = 'pp-grid';
  grid.innerHTML = '<span class="pp-empty">Chargez d\'abord un fichier PDF</span>';
  wrap.appendChild(grid);

  // Hidden input for form submission
  const hidden = document.createElement('input');
  hidden.type = 'hidden'; hidden.name = f.name;
  wrap.appendChild(hidden);

  return wrap;
}

async function refreshPickersForPanel(panelId, file) {
  const panel = document.getElementById('panel-' + panelId);
  if (!panel) return;
  const pickers = panel.querySelectorAll('.pages-picker');
  if (!pickers.length) return;

  const doc = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
  // Build thumbnails
  for (let i = 1; i <= doc.numPages; i++) {
    if (!thumbCache[i]) {
      const page = await doc.getPage(i);
      const vp = page.getViewport({scale: 64/page.getViewport({scale:1}).width});
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
      thumbCache[i] = {url: canvas.toDataURL(), w: vp.width, h: vp.height};
    }
  }

  pickers.forEach(picker => {
    const mode = picker.dataset.mode;
    const hidden = picker.querySelector('input[type="hidden"]');
    const grid = picker.querySelector('.pp-grid');
    grid.innerHTML = '';

    const order = Array.from({length: doc.numPages}, (_, i) => i + 1);
    let selected = new Set();
    let dragSrc = null;

    const render = () => {
      grid.innerHTML = '';
      order.forEach((pageNum, idx) => {
        const thumb = thumbCache[pageNum];
        const el = document.createElement('div');
        el.className = 'pp-thumb' + (mode === 'reorder' ? ' draggable' : '');
        el.dataset.page = pageNum;
        el.dataset.idx = idx;
        if (selected.has(pageNum)) el.classList.add('selected');

        const img = document.createElement('canvas');
        img.width = thumb.w; img.height = thumb.h;
        const ctx = img.getContext('2d');
        const image = new Image(); image.src = thumb.url;
        image.onload = () => ctx.drawImage(image, 0, 0);
        el.appendChild(img);

        const num = document.createElement('div');
        num.className = 'pp-num'; num.textContent = pageNum;
        el.appendChild(num);

        const check = document.createElement('div');
        check.className = 'pp-check';
        el.appendChild(check);

        if (mode === 'select' || mode === 'ranges') {
          el.onclick = () => {
            if (selected.has(pageNum)) selected.delete(pageNum);
            else selected.add(pageNum);
            el.classList.toggle('selected', selected.has(pageNum));
            updateHidden();
          };
        }

        if (mode === 'reorder') {
          el.draggable = true;
          el.ondragstart = () => { dragSrc = idx; el.style.opacity = '.4'; };
          el.ondragend = () => { el.style.opacity = '1'; grid.querySelectorAll('.pp-thumb').forEach(t => t.classList.remove('drag-target')); };
          el.ondragover = e => { e.preventDefault(); el.classList.add('drag-target'); };
          el.ondragleave = () => el.classList.remove('drag-target');
          el.ondrop = e => {
            e.preventDefault();
            if (dragSrc !== idx) {
              const moved = order.splice(dragSrc, 1)[0];
              order.splice(idx, 0, moved);
              dragSrc = idx;
              render();
              updateHidden();
            }
          };
        }
        grid.appendChild(el);
      });
    };

    const updateHidden = () => {
      if (mode === 'reorder') hidden.value = order.join(',');
      else if (mode === 'select') hidden.value = selected.size ? [...selected].sort((a,b)=>a-b).join(',') : '';
      else if (mode === 'ranges') hidden.value = selected.size ? [...selected].sort((a,b)=>a-b).join(',') : '';
    };

    render();
    updateHidden();
  });
}

// ── Preview ───────────────────────────────────────────────────────────────
document.getElementById('tab-input').onclick = () => switchTab('input');
document.getElementById('tab-output').onclick = () => switchTab('output');

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-input').classList.toggle('active', tab === 'input');
  document.getElementById('tab-output').classList.toggle('active', tab === 'output');
  const blob = tab === 'input' ? inputBlob : outputBlob;
  if (blob) renderPDF(blob);
  else showPlaceholder(tab === 'output' ? 'Le résultat apparaîtra ici' : 'Sélectionnez un fichier\npour voir l\'aperçu');
}

async function renderPDF(blob) {
  const body = document.getElementById('preview-body');
  body.innerHTML = '<div class="preview-placeholder"><span>Chargement…</span></div>';
  try {
    const doc = await pdfjsLib.getDocument({data: await blob.arrayBuffer()}).promise;
    previewDoc = doc; previewPage = 1;
    updatePageControls();
    await renderPage(previewPage);
  } catch(e) {
    body.innerHTML = `<div class="preview-placeholder"><span>Aperçu indisponible<br><small style="opacity:.5">${e.message}</small></span></div>`;
  }
}

async function renderPage(num) {
  const body = document.getElementById('preview-body');
  body.innerHTML = '';
  const page = await previewDoc.getPage(num);
  const vp0 = page.getViewport({scale: 1});
  const scale = (body.clientWidth - 28) / vp0.width;
  const vp = page.getViewport({scale});
  xyViewport = {scale, offsetX: 0, offsetY: 0, pdfWidth: vp0.width, pdfHeight: vp0.height};

  const wrap = document.createElement('div');
  wrap.className = 'canvas-wrap' + (xyMode ? '' : ' normal-cursor');
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  const crosshair = document.createElement('div');
  crosshair.className = 'xy-crosshair';
  wrap.appendChild(canvas); wrap.appendChild(crosshair);
  body.appendChild(wrap);

  await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;

  // XY click handler
  wrap.onmousemove = e => {
    if (!xyMode) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    crosshair.style.left = cx + 'px';
    crosshair.style.top = cy + 'px';
    crosshair.classList.add('visible');
  };
  wrap.onmouseleave = () => crosshair.classList.remove('visible');
  wrap.onclick = e => {
    if (!xyMode) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    // Convert to PDF pts (PDF y starts from bottom)
    const pdfX = Math.round(cx / scale);
    const pdfY = Math.round(cy / scale);
    if (xyTargetX) xyTargetX.value = pdfX;
    if (xyTargetY) xyTargetY.value = pdfY;
    // Visual flash
    crosshair.classList.add('visible');
    wrap.style.outline = '2px solid var(--accent)';
    setTimeout(() => { wrap.style.outline = ''; }, 600);
  };
}

function updatePageControls() {
  const total = previewDoc?.numPages || 0;
  document.getElementById('prev-page').disabled = previewPage <= 1;
  document.getElementById('next-page').disabled = previewPage >= total;
  document.getElementById('page-info').textContent = total ? `${previewPage} / ${total}` : '—';
}

document.getElementById('prev-page').onclick = async () => {
  if (previewPage > 1) { previewPage--; updatePageControls(); await renderPage(previewPage); }
};
document.getElementById('next-page').onclick = async () => {
  if (previewDoc && previewPage < previewDoc.numPages) { previewPage++; updatePageControls(); await renderPage(previewPage); }
};

function showPlaceholder(msg) {
  previewDoc = null;
  document.getElementById('preview-body').innerHTML = `<div class="preview-placeholder">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span>${msg.replace(/\n/g,'<br>')}</span></div>`;
  document.getElementById('page-info').textContent = '—';
  document.getElementById('prev-page').disabled = true;
  document.getElementById('next-page').disabled = true;
}

// ── XY mode ───────────────────────────────────────────────────────────────
function activateXYMode(panelId) {
  xyMode = true;
  xyTargetX = document.getElementById(`xy-${panelId}-x`);
  xyTargetY = document.getElementById(`xy-${panelId}-y`);
  document.getElementById('xy-indicator').classList.add('visible');
  if (inputBlob && activeTab !== 'input') switchTab('input');
  else if (inputBlob) renderPage(previewPage); // re-render with crosshair
}

function deactivateXYMode() {
  xyMode = false; xyTargetX = null; xyTargetY = null;
  document.getElementById('xy-indicator').classList.remove('visible');
  if (previewDoc) renderPage(previewPage);
}

// ── Submit ────────────────────────────────────────────────────────────────
async function submitForm(item, form) {
  const btn = form.querySelector('button.submit');
  const resultEl = document.getElementById('result-' + item.id);
  const jsonEl = document.getElementById('json-' + item.id);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Traitement…';
  resultEl.className = 'result'; resultEl.textContent = '';
  jsonEl.style.display = 'none';

  try {
    const fd = new FormData(form);
    const resp = await fetch(item.endpoint, {method:'POST', headers:{'X-API-Key': API_KEY}, body: fd});
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({detail: resp.statusText}));
      throw new Error(err.detail || resp.statusText);
    }

    if (item.rtype === 'blob') {
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const ct = resp.headers.get('content-type') || '';
      const base = item.dl || 'output';
      const ext = ct.includes('zip') ? '.zip' : base.includes('.') ? '' : '.pdf';
      const filename = base + ext;
      resultEl.innerHTML = `✓ Succès — <a href="${url}" download="${filename}">Télécharger ${filename}</a>`;
      resultEl.className = 'result success';

      if (ct.includes('pdf') || filename.endsWith('.pdf')) {
        lastOutputBlob = blob;
        outputBlob = blob;
        switchTab('output');
        showChainPill();
      }
    } else {
      const data = await resp.json();
      jsonEl.textContent = JSON.stringify(data, null, 2);
      jsonEl.style.display = 'block';
      resultEl.textContent = '✓ Résultat ci-dessous';
      resultEl.className = 'result success';
    }
  } catch(err) {
    resultEl.textContent = '✗ ' + err.message;
    resultEl.className = 'result error';
  } finally {
    btn.disabled = false; btn.textContent = 'Lancer';
  }
}

// ── Chaining ──────────────────────────────────────────────────────────────
function showChainPill() {
  document.getElementById('chain-pill').classList.add('visible');
}

document.getElementById('chain-pill').onclick = () => {
  document.getElementById('chain-overlay').classList.add('visible');
  buildChainOps();
};
document.getElementById('chain-cancel').onclick = () => {
  document.getElementById('chain-overlay').classList.remove('visible');
};
document.getElementById('chain-overlay').onclick = e => {
  if (e.target === document.getElementById('chain-overlay'))
    document.getElementById('chain-overlay').classList.remove('visible');
};

function buildChainOps() {
  const container = document.getElementById('chain-ops');
  container.innerHTML = '';
  PANELS.forEach(group => group.items.forEach(item => {
    // Only show ops that accept a single PDF file as first field
    const firstFile = item.fields.find(f => f.type === 'file' && !f.multiple);
    if (!firstFile) return;
    const btn = document.createElement('button');
    btn.className = 'chain-op-btn';
    btn.innerHTML = `<strong>${item.label}</strong><br><span style="font-size:11px;color:var(--dim)">${group.group}</span>`;
    btn.onclick = () => injectChainResult(item, firstFile.name);
    container.appendChild(btn);
  }));
}

async function injectChainResult(item, fieldName) {
  document.getElementById('chain-overlay').classList.remove('visible');
  document.getElementById('chain-pill').classList.remove('visible');
  activate(item.id);

  // Create a File from the blob and inject it into the drop zone
  const file = new File([lastOutputBlob], 'result.pdf', {type: 'application/pdf'});
  const dt = new DataTransfer(); dt.items.add(file);

  const form = document.getElementById('form-' + item.id);
  const inp = form.querySelector(`input[name="${fieldName}"][type="file"]`);
  if (inp) {
    inp.files = dt.files;
    inp.dispatchEvent(new Event('change'));
  }
}

// ── Navigation ────────────────────────────────────────────────────────────
function activate(id) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`nav button[data-id="${id}"]`).classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');

  // XY mode: activate if this panel has xy fields and a PDF is loaded
  const panel = document.getElementById('panel-' + id);
  const hasXY = panel.querySelector('input[data-axis]');
  if (hasXY && inputBlob) activateXYMode(id);
  else deactivateXYMode();
}

// ── Auth ──────────────────────────────────────────────────────────────────
async function tryLogin(key) {
  const r = await fetch('/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key})});
  return r.ok;
}

async function boot() {
  if (API_KEY && await tryLogin(API_KEY).catch(()=>false)) { showApp(); return; }
  localStorage.removeItem('quill_api_key'); API_KEY = '';
}

document.getElementById('login-btn').onclick = async () => {
  const key = document.getElementById('login-key').value.trim();
  if (!key) return;
  if (await tryLogin(key).catch(()=>false)) {
    API_KEY = key; localStorage.setItem('quill_api_key', key);
    document.getElementById('login-err').style.display = 'none';
    showApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
};
document.getElementById('login-key').onkeydown = e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); };

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const m = API_KEY.slice(0,4) + '••••' + API_KEY.slice(-4);
  document.getElementById('key-display').textContent = m;
}

document.getElementById('key-display').onclick = () => {
  navigator.clipboard.writeText(API_KEY);
  const el = document.getElementById('key-display');
  const m = API_KEY.slice(0,4) + '••••' + API_KEY.slice(-4);
  el.textContent = 'Copié !';
  setTimeout(() => el.textContent = m, 1500);
};

document.getElementById('logout-btn').onclick = () => {
  localStorage.removeItem('quill_api_key'); API_KEY = '';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-key').value = '';
};

// ── Boot ──────────────────────────────────────────────────────────────────
activate(PANELS[0].items[0].id);
showPlaceholder('Sélectionnez un fichier\npour voir l\'aperçu');
boot();
</script>
